version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./data/protein_agent.db
      - RAG_ENABLED=true
    volumes:
      - ./app/data:/app/data
      - sqlite_data:/app/data
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: always

  worker:
    build: .
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./data/protein_agent.db
      - RAG_ENABLED=true
    volumes:
      - ./app/data:/app/data
      - sqlite_data:/app/data
    depends_on:
      - redis
      - web
    command: celery -A app.worker.celery_app worker --loglevel=info
    restart: always

volumes:
  redis_data:
  sqlite_data:
